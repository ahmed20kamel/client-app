services:
  - type: web
    name: crm-pro
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      # Database
      - key: DATABASE_URL
        value: file:./dev.db

      # Clerk Authentication
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        value: pk_test_ZGVzaXJlZC10aWNrLTE2LmNsZXJrLmFjY291bnRzLmRldiQ
      - key: CLERK_SECRET_KEY
        sync: false # Set manually in Render dashboard
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /en/sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /en/sign-up
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
        value: /en/dashboard
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL
        value: /en/dashboard

      # App
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          type: web
          name: crm-pro
          property: host
      - key: NODE_ENV
        value: production

      # Email (Resend)
      - key: RESEND_API_KEY
        value: re_eovVK2oh_FGPwRZL3cMBqjUfVrJJxMzb8
      - key: EMAIL_FROM
        value: "CRM Pro <noreply@crmpro.com>"

      # Real-time (Pusher)
      - key: NEXT_PUBLIC_PUSHER_KEY
        value: 7b3f7a35efd0102fd4a5
      - key: NEXT_PUBLIC_PUSHER_CLUSTER
        value: eu
      - key: PUSHER_APP_ID
        value: "2121484"
      - key: PUSHER_SECRET
        value: 3a4f4bb1e94a925ac92d
